org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Gradle build properties
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.configureondemand=false

# Fix for Windows cross-drive path issues
org.gradle.unsafe.configuration-cache=false
org.gradle.configuration-cache=false

# Network hardening to avoid intermittent TLS issues (Tag mismatch) on Windows
systemProp.org.gradle.internal.http.tlsProtocols=TLSv1.2
systemProp.https.protocols=TLSv1.2
systemProp.org.gradle.internal.http.tlsDisableALPN=true
systemProp.org.gradle.internal.http.connectionTimeout=60000
systemProp.org.gradle.internal.http.socketTimeout=120000
systemProp.org.gradle.internal.http.retry.maxAttempts=3
systemProp.org.gradle.internal.http.retry.initialBackOff=2000

# Flutter build properties
flutter.compileSdkVersion=34
flutter.targetSdkVersion=34
flutter.minSdkVersion=21

# Disable warnings for now
android.suppressUnsupportedCompileSdk=34
